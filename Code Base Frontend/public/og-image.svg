<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630" role="img" aria-label="ER Emergency AI Portal">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#ef4444"/>
      <stop offset="100%" stop-color="#f97316"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- subtle grid -->
  <g stroke="#1f2a44" stroke-width="1" opacity="0.4">
    <path d="M0 80 H1200 M0 160 H1200 M0 240 H1200 M0 320 H1200 M0 400 H1200 M0 480 H1200 M0 560 H1200"/>
    <path d="M80 0 V630 M200 0 V630 M320 0 V630 M440 0 V630 M560 0 V630 M680 0 V630 M800 0 V630 M920 0 V630 M1040 0 V630 M1160 0 V630"/>
  </g>

  <!-- cross emblem -->
  <g transform="translate(96 96)">
    <rect width="120" height="120" rx="28" fill="url(#accent)"/>
    <rect x="50" y="20" width="20" height="80" rx="6" fill="#ffffff"/>
    <rect x="20" y="50" width="80" height="20" rx="6" fill="#ffffff"/>
  </g>

  <!-- wordmark -->
  <text x="240" y="160" font-family="Inter, system-ui, -apple-system, Segoe UI, Helvetica, Arial, sans-serif" font-weight="700" font-size="56" fill="#f8fafc">ER Emergency AI Portal</text>
  <text x="240" y="200" font-family="Inter, system-ui, -apple-system, Segoe UI, Helvetica, Arial, sans-serif" font-weight="500" font-size="24" fill="#94a3b8">Command Center for hospital Emergency Rooms</text>

  <!-- tagline + features -->
  <g transform="translate(96 320)" font-family="Inter, system-ui, -apple-system, Segoe UI, Helvetica, Arial, sans-serif" fill="#cbd5e1">
    <text x="0" y="0" font-size="34" font-weight="600" fill="#f1f5f9">AI triage · Bed management · Real-time alerts</text>
    <g transform="translate(0 60)" font-size="22">
      <g transform="translate(0 0)">
        <circle cx="14" cy="-8" r="6" fill="#22c55e"/>
        <text x="34" y="0">Auto-triage every new arrival</text>
      </g>
      <g transform="translate(0 44)">
        <circle cx="14" cy="-8" r="6" fill="#3b82f6"/>
        <text x="34" y="0">Overflow bed assignment across departments</text>
      </g>
      <g transform="translate(0 88)">
        <circle cx="14" cy="-8" r="6" fill="#f59e0b"/>
        <text x="34" y="0">Multi-tenant, HIPAA-shaped audit trail</text>
      </g>
    </g>
  </g>

  <!-- bottom strip -->
  <rect x="0" y="600" width="1200" height="30" fill="url(#accent)"/>
</svg>
